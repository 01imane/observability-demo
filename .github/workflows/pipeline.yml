name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Code holen
        uses: actions/checkout@v3

      - name: Node installieren
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Dependencies installieren
        run: npm install

      - name: Tests ausführen
        run: npm test
